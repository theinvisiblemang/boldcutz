<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bold Cuts | Premium Lounge</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #000; --red: #e63946; --card: #111; --blue: #00a8ff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg); 
      color: white; 
      overflow-x: hidden; 
    }

    /* INTRO ANIMATION */
    #splash {
      position: fixed; inset: 0; background: #000; z-index: 9999;
      display: flex; justify-content: center; align-items: center;
      animation: fadeOut 0.6s forwards 3.5s;
    }
    .logo-anim {
      font-family: 'Cinzel', serif; font-size: 2rem; color: var(--red);
      letter-spacing: 4px; animation: pulse 2s infinite;
    }
    @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* LAYOUT */
    .container { max-width: 450px; margin: 0 auto; min-height: 100vh; }

    .hero {
      height: 500px; padding: 25px;
      display: flex; flex-direction: column; justify-content: flex-end;
      background: linear-gradient(0deg, #000 15%, transparent 100%), url('images/fade.jpg') center/cover;
    }

    .btn-book {
      background: var(--blue); color: white; text-decoration: none;
      padding: 18px; border-radius: 12px; font-weight: 800; text-align: center;
      margin-top: 20px; display: block;
    }

    /* MARQUEE SCROLL */
    .marquee { overflow: hidden; padding: 20px 0; background: #080808; margin: 10px 0; }
    .track { display: flex; gap: 15px; animation: drift 20s linear infinite; width: max-content; }
    .tag { background: var(--card); padding: 8px 18px; border-radius: 20px; white-space: nowrap; font-weight: 600; border: 1px solid #222; }
    @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* LOOKBOOK */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
    .card { background: var(--card); border-radius: 10px; overflow: hidden; }
    .card img { width: 100%; height: 150px; object-fit: cover; display: block; }
    .card p { padding: 10px; font-size: 0.75rem; text-align: center; font-weight: 800; text-transform: uppercase; }
  </style>
</head>
<body>

  <div id="splash"><div class="logo-anim">BOLD CUTS</div></div>

  <div class="container">
    <header class="hero">
      <h1 style="font-size: 3rem; line-height: 1;">BOLD<br>CUTS</h1>
      <p style="color: #888; margin-top: 10px;">Premium Barbering & Grooming Lounge</p>
      <a href="https://boldcutzbarberslounge.mysalononline.com/BookNow" class="btn-book">BOOK APPOINTMENT</a>
    </header>

    <div class="marquee">
      <div class="track">
        <div class="tag">Barber Cuts</div><div class="tag">Nails</div><div class="tag">Facials</div><div class="tag">Braids</div><div class="tag">Locs</div>
        <div class="tag">Barber Cuts</div><div class="tag">Nails</div><div class="tag">Facials</div><div class="tag">Braids</div><div class="tag">Locs</div>
      </div>
    </div>

    <div class="grid">
      <div class="card"><img src="images/fade.jpg"><p>Fades</p></div>
      <div class="card"><img src="images/nails.jpg"><p>Nail Art</p></div>
      <div class="card"><img src="images/facial.jpg"><p>Skincare</p></div>
      <div class="card"><img src="images/braids.jpg"><p>Braids</p></div>
    </div>
  </div>

</body>
</html>
